<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Avalanche Forecast Analysis Engine</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<header>
			<h1>Avalanche Forecast Analysis Engine</h1>
			<p class="description">
				Real-time monitoring and alerting across all 9 UAC forecast zones.
				Aggregates snowpack, weather, and danger ratings to surface critical
				conditions before they become emergencies.
			</p>
		</header>

		<main>
			<div id="snapshot-date" class="snapshot-date"></div>
			<div id="summary-bar" class="summary-bar hidden"></div>
			<div id="zones-grid" class="zones-grid"></div>
		</main>

		<div id="zone-modal" class="modal hidden">
			<div id="modal-overlay" class="modal-overlay"></div>
			<div class="modal-content">
				<button id="modal-close" class="modal-close">✕</button>
				<div id="modal-body"></div>
			</div>
		</div>

		<script src="/app.js"></script>
	</body>
</html>
