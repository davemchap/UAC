<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Avalanche Forecast Analysis Engine</title>
		<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<header>
			<div class="header-top">
				<div></div>
				<div class="header-title-block">
					<h1>Avalanche Forecast Analysis Engine</h1>
					<p class="description">
						Real-time monitoring and alerting across all 9 UAC forecast zones.
						Aggregates snowpack, weather, and danger ratings to surface critical
						conditions before they become emergencies.
					</p>
				</div>
				<div class="header-actions">
					<button id="notif-bell" class="notif-bell" aria-label="Notifications">
						<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
							<path d="M13.73 21a2 2 0 0 1-3.46 0"/>
						</svg>
						<span id="notif-count" class="notif-count hidden">0</span>
					</button>
				</div>
			</div>
		</header>

		<div id="notif-overlay" class="notif-overlay hidden"></div>
		<div id="notif-panel" class="notif-panel hidden">
			<div class="notif-panel-header">
				<span class="notif-panel-title">Notifications</span>
				<button id="notif-panel-close" class="notif-panel-close" aria-label="Close notifications">✕</button>
			</div>
			<div id="notif-list" class="notif-list"></div>
		</div>

		<main>
			<div id="snapshot-date" class="snapshot-date"></div>
			<div id="summary-bar" class="summary-bar hidden"></div>

			<div class="tab-bar">
				<button id="tab-grid" class="tab-btn tab-active" onclick="switchTab('grid')">Grid</button>
				<button id="tab-map" class="tab-btn" onclick="switchTab('map')">Map</button>
			</div>

			<div id="view-grid">
				<div id="zones-grid" class="zones-grid"></div>
			</div>

			<div id="view-map" class="hidden">
				<div id="map-container"></div>
			</div>
		</main>

		<div id="zone-modal" class="modal hidden">
			<div id="modal-overlay" class="modal-overlay"></div>
			<div class="modal-content">
				<button id="modal-close" class="modal-close">✕</button>
				<div id="modal-body"></div>
			</div>
		</div>

		<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
		<script src="/app.js"></script>
		<script src="/map.js"></script>
	</body>
</html>
